<svg viewBox="0 0 760 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <title id="t">立场与利益的谈判冰山模型</title>
  <desc id="d">两座对望的冰山。水面以上的尖端是双方说出口的「立场」，常针锋相对；水面以下是隐藏的「利益」与更深的需求、恐惧与价值，双方常有交集，重叠处即成交区 ZOPA。</desc>

  <rect x="0" y="0" width="760" height="560" fill="#ffffff"/>

  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b6ea5"/>
    </marker>
    <marker id="ahd" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
  </defs>

  <text x="380" y="36" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="23" font-weight="700" fill="#1a1a1a">立场 vs 利益 · 谈判冰山</text>
  <text x="380" y="60" text-anchor="middle" font-size="13.5" fill="#6b7280">尖尖（立场）针锋相对，水面下（利益）常有交集</text>

  <line x1="36" y1="252" x2="724" y2="252" stroke="#3b6ea5" stroke-width="1.5" stroke-dasharray="7 5" opacity="0.8"/>
  <text x="40" y="244" font-size="11.5" fill="#6b7280">水上 · 看得见 · 说出口</text>
  <text x="40" y="270" font-size="11.5" fill="#3b6ea5">水下 · 看不见 · 真动机</text>

  <!-- LEFT iceberg -->
  <text x="200" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a">我方</text>
  <path d="M200,108 L168,252 L232,252 Z" fill="#6b7280" fill-opacity="0.10" stroke="#c7ccd1" stroke-width="1.3"/>
  <path d="M168,252 L232,252 L256,372 L226,474 L174,474 L144,372 Z" fill="#3b6ea5" fill-opacity="0.13" stroke="#3b6ea5" stroke-opacity="0.5" stroke-width="1.3"/>
  <g stroke="#6b7280" stroke-opacity="0.35" stroke-width="1.2">
    <line x1="191" y1="150" x2="191" y2="452"/><line x1="209" y1="150" x2="209" y2="452"/>
    <line x1="191" y1="180" x2="209" y2="180"/><line x1="191" y1="300" x2="209" y2="300"/>
    <line x1="191" y1="345" x2="209" y2="345"/><line x1="191" y1="405" x2="209" y2="405"/>
    <line x1="191" y1="440" x2="209" y2="440"/>
  </g>
  <text x="200" y="232" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a1a">立场</text>
  <text x="200" y="318" text-anchor="middle" font-size="14" font-weight="700" fill="#3b6ea5">利益</text>
  <text x="200" y="336" text-anchor="middle" font-size="10.5" fill="#6b7280">为什么要</text>
  <text x="200" y="420" text-anchor="middle" font-size="12.5" font-weight="700" fill="#3b6ea5">深层需求</text>
  <text x="200" y="437" text-anchor="middle" font-size="10" fill="#6b7280">恐惧·价值·安全感</text>

  <!-- RIGHT iceberg -->
  <text x="560" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a">对方</text>
  <path d="M560,108 L528,252 L592,252 Z" fill="#6b7280" fill-opacity="0.10" stroke="#c7ccd1" stroke-width="1.3"/>
  <path d="M528,252 L592,252 L616,372 L586,474 L534,474 L504,372 Z" fill="#3b6ea5" fill-opacity="0.13" stroke="#3b6ea5" stroke-opacity="0.5" stroke-width="1.3"/>
  <g stroke="#6b7280" stroke-opacity="0.35" stroke-width="1.2">
    <line x1="551" y1="150" x2="551" y2="452"/><line x1="569" y1="150" x2="569" y2="452"/>
    <line x1="551" y1="180" x2="569" y2="180"/><line x1="551" y1="300" x2="569" y2="300"/>
    <line x1="551" y1="345" x2="569" y2="345"/><line x1="551" y1="405" x2="569" y2="405"/>
    <line x1="551" y1="440" x2="569" y2="440"/>
  </g>
  <text x="560" y="232" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a1a">立场</text>
  <text x="560" y="318" text-anchor="middle" font-size="14" font-weight="700" fill="#3b6ea5">利益</text>
  <text x="560" y="336" text-anchor="middle" font-size="10.5" fill="#6b7280">为什么要</text>
  <text x="560" y="420" text-anchor="middle" font-size="12.5" font-weight="700" fill="#3b6ea5">深层需求</text>
  <text x="560" y="437" text-anchor="middle" font-size="10" fill="#6b7280">恐惧·价值·安全感</text>

  <line x1="104" y1="210" x2="104" y2="430" stroke="#3b6ea5" stroke-width="1.6" marker-end="url(#ah)"/>
  <text x="96" y="325" text-anchor="middle" font-size="11.5" fill="#3b6ea5" transform="rotate(-90 96 325)">沿梯下降：连问「为什么」</text>
  <line x1="656" y1="210" x2="656" y2="430" stroke="#3b6ea5" stroke-width="1.6" marker-end="url(#ah)"/>
  <text x="664" y="325" text-anchor="middle" font-size="11.5" fill="#3b6ea5" transform="rotate(90 664 325)">沿梯下降：连问「为什么」</text>

  <text x="380" y="150" text-anchor="middle" font-size="12" fill="#6b7280">✕ 立场常冲突</text>

  <rect x="298" y="392" width="164" height="72" rx="12" fill="#3b6ea5" fill-opacity="0.18" stroke="#3b6ea5" stroke-width="1.4"/>
  <text x="380" y="422" text-anchor="middle" font-size="14.5" font-weight="700" fill="#3b6ea5">成交区</text>
  <text x="380" y="442" text-anchor="middle" font-size="11" fill="#1a1a1a">共同利益 · ZOPA</text>
  <text x="380" y="456" text-anchor="middle" font-size="9.5" fill="#6b7280">✓ 利益常重叠</text>
  <line x1="258" y1="420" x2="296" y2="424" stroke="#6b7280" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#ahd)"/>
  <line x1="502" y1="420" x2="464" y2="424" stroke="#6b7280" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#ahd)"/>

  <text x="380" y="512" text-anchor="middle" font-size="11.5" fill="#6b7280">谈判不在尖端比谁更横，而在水下找两座冰山的交集</text>
</svg>
